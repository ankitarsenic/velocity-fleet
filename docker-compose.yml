services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: transitops
      MYSQL_USER: transitops
      MYSQL_PASSWORD: transitops
      MYSQL_ROOT_PASSWORD: rootpassword
    ports: ["3306:3306"]
    volumes: [mysql_data:/var/lib/mysql]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
  backend:
    build: ./backend
    env_file: .env
    ports: ["5000:5000"]
    depends_on:
      mysql: { condition: service_healthy }
  frontend:
    build: ./frontend
    environment: [VITE_API_BASE_URL=http://localhost:5000/api]
    ports: ["5173:80"]
    depends_on: [backend]
  phpmyadmin:
    image: phpmyadmin:latest
    environment: [PMA_HOST=mysql]
    ports: ["8080:80"]
    depends_on: [mysql]
volumes:
  mysql_data:
